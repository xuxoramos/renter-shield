name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

      - name: Verify Docker build
        run: |
          mkdir -p output
          touch output/all_landlords_harm_scores.parquet
          docker build -t renter-shield:ci .

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to Hetzner
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HOST: ${{ secrets.HETZNER_HOST }}
          API_KEYS: ${{ secrets.LI_API_KEYS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            root@"$HOST" << DEPLOY
            set -e

            # First deploy: clone; subsequent: pull
            if [ ! -d /opt/renter-shield/.git ]; then
              mkdir -p /opt/renter-shield
              cd /opt/renter-shield
              git init
              git remote add origin https://github.com/xuxoramos/renter-shield.git
              git fetch origin main
              git checkout -f origin/main -B main
            else
              cd /opt/renter-shield
              git fetch origin main
              git reset --hard origin/main
            fi

            cd /opt/renter-shield

            # Write env file where docker compose can find it
            cat > deploy/.env << EOF
          LI_API_KEYS=${API_KEYS}
          LI_OUTPUT_DIR=/app/output
          EOF

            # Build and restart
            cd deploy
            docker compose up -d --build --force-recreate --remove-orphans

            # Wait for health check to pass
            echo "Waiting for services to become healthy..."
            timeout 240 sh -c 'until docker compose ps app | grep -q healthy; do sleep 5; done' || true
            docker compose ps
          DEPLOY
