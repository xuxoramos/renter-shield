events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=web:10m rate=60r/m;

    # Proper WebSocket Connection header: "upgrade" for WS, "close" for plain HTTP.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream api {
        server app:8000;
    }

    upstream renter {
        server app:8501;
    }

    upstream investigator {
        server app:8502;
    }

    # HTTP — redirect domain traffic to HTTPS
    server {
        listen 80;
        server_name rentershield.org www.rentershield.org ftp.rentershield.org;

        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Default HTTP handler — bare-IP or unknown hostname.
    # Serves the full app over plain HTTP so the site is reachable before
    # DNS propagation or TLS setup completes.
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        # --- Landing page at root ---
        location = / {
            root /usr/share/nginx/html/landing;
            index index.html;
        }
        location /about {
            alias /usr/share/nginx/html/landing;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        # Trailing-slash redirects
        location = /renter {
            return 301 /renter/;
        }
        location = /investigator {
            return 301 /investigator/;
        }

        # --- Renter Streamlit ---
        location /renter/ {
            limit_req zone=web burst=20 nodelay;
            proxy_pass http://renter;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # --- Investigator Streamlit ---
        location /investigator/ {
            limit_req zone=web burst=20 nodelay;
            proxy_pass http://investigator;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # --- Streamlit static assets ---
        location /renter/static/ {
            proxy_pass http://renter;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_cache_valid 200 1h;
            add_header Cache-Control "public, max-age=3600";
        }
        location /investigator/static/ {
            proxy_pass http://investigator;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_cache_valid 200 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # --- Streamlit internal endpoints ---
        location /renter/_stcore/ {
            proxy_pass http://renter;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }
        location /investigator/_stcore/ {
            proxy_pass http://investigator;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # --- API routes ---
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://api/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name rentershield.org www.rentershield.org ftp.rentershield.org;

        ssl_certificate     /etc/letsencrypt/live/rentershield.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rentershield.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # --- Landing page at root ---
        location = / {
            root /usr/share/nginx/html/landing;
            index index.html;
        }
        location /about {
            alias /usr/share/nginx/html/landing;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        # Trailing-slash redirects
        location = /renter {
            return 301 /renter/;
        }
        location = /investigator {
            return 301 /investigator/;
        }

        # --- Renter Streamlit ---
        location /renter/ {
            limit_req zone=web burst=20 nodelay;
            proxy_pass http://renter;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # --- Investigator Streamlit ---
        location /investigator/ {
            limit_req zone=web burst=20 nodelay;
            proxy_pass http://investigator;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # --- Streamlit static assets ---
        location /renter/static/ {
            proxy_pass http://renter;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_cache_valid 200 1h;
            add_header Cache-Control "public, max-age=3600";
        }
        location /investigator/static/ {
            proxy_pass http://investigator;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_cache_valid 200 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # --- Streamlit internal endpoints ---
        location /renter/_stcore/ {
            proxy_pass http://renter;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }
        location /investigator/_stcore/ {
            proxy_pass http://investigator;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # --- API routes ---
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://api/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
