events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=web:10m rate=60r/m;

    # Proper WebSocket Connection header: "upgrade" for WS, "close" for plain HTTP.
    # Without this map every proxied request (including plain page loads) would
    # carry Connection: upgrade, which is incorrect and can confuse Streamlit.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream api {
        server app:8000;
    }

    upstream renter {
        server app:8501;
    }

    upstream investigator {
        server app:8502;
    }

    server {
        listen 80;
        server_name _;

        # Redirect all HTTP to HTTPS (uncomment when TLS is configured)
        # return 301 https://$host$request_uri;

        # Redirect /investigator (no trailing slash) so the Streamlit baseUrlPath
        # always receives the canonical /investigator/ prefix it expects.
        location = /investigator {
            return 301 /investigator/;
        }

        # --- Static landing page ---
        location /about {
            alias /usr/share/nginx/html/landing;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        # --- Static assets (no rate limit, cached) ---
        location /static/ {
            proxy_pass http://renter;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_cache_valid 200 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        location /investigator/static/ {
            proxy_pass http://investigator;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_cache_valid 200 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # --- Streamlit internal endpoints (no rate limit) ---
        location /_stcore/ {
            proxy_pass http://renter;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        location /investigator/_stcore/ {
            proxy_pass http://investigator;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # --- API routes ---
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://api/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Renter Streamlit (public, default) ---
        location / {
            limit_req zone=web burst=20 nodelay;

            proxy_pass http://renter;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # --- Investigator Streamlit (separate path) ---
        # Streamlit is started with --server.baseUrlPath investigator so it
        # expects to receive requests with the /investigator/ prefix intact.
        # proxy_pass without a trailing-slash URI preserves the full path.
        location /investigator/ {
            limit_req zone=web burst=20 nodelay;

            proxy_pass http://investigator;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # Health check
        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }

    # TLS server block (uncomment after certbot)
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.example.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.example.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.example.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # Copy location blocks from above
    # }
}
