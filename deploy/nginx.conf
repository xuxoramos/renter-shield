events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=web:10m rate=60r/m;

    upstream api {
        server app:8000;
    }

    # HTTP — redirect domain traffic to HTTPS
    server {
        listen 80;
        server_name rentershield.org www.rentershield.org ftp.rentershield.org;

        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Default HTTP handler — bare-IP or unknown hostname.
    # Serves the full app over plain HTTP so the site is reachable before
    # DNS propagation or TLS setup completes.
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        # --- Landing page at root ---
        location = / {
            return 301 /about;
        }
        location /about {
            alias /usr/share/nginx/html/landing/;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        # Trailing-slash redirects
        location = /renter {
            return 301 /renter/;
        }
        location = /investigator {
            return 301 /investigator/;
        }

        # --- Web UI (renter + investigator, served by FastAPI) ---
        location /renter/ {
            limit_req zone=web burst=20 nodelay;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /investigator/ {
            limit_req zone=web burst=20 nodelay;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Static assets (CSS, JS) ---
        location /static/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering on;
            proxy_cache_valid 200 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # --- API routes ---
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name rentershield.org www.rentershield.org ftp.rentershield.org;

        ssl_certificate     /etc/letsencrypt/live/rentershield.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rentershield.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # --- Landing page at root ---
        location = / {
            return 301 /about;
        }
        location /about {
            alias /usr/share/nginx/html/landing/;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        # Trailing-slash redirects
        location = /renter {
            return 301 /renter/;
        }
        location = /investigator {
            return 301 /investigator/;
        }

        # --- Web UI (renter + investigator, served by FastAPI) ---
        location /renter/ {
            limit_req zone=web burst=20 nodelay;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /investigator/ {
            limit_req zone=web burst=20 nodelay;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Static assets (CSS, JS) ---
        location /static/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering on;
            proxy_cache_valid 200 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # --- API routes ---
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
