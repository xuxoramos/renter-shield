events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=web:10m rate=60r/m;

    # Proper WebSocket Connection header: "upgrade" for WS, "close" for plain HTTP.
    # Without this map every proxied request (including plain page loads) would
    # carry Connection: upgrade, which is incorrect and can confuse Streamlit.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream api {
        server app:8000;
    }

    upstream renter {
        server app:8501;
    }

    upstream investigator {
        server app:8502;
    }

    # HTTP — redirect everything to HTTPS
    server {
        listen 80;
        server_name rentershield.org www.rentershield.org ftp.rentershield.org;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Default HTTP handler — responds to bare-IP requests and any
    # hostname that isn't rentershield.org.  Useful for verifying the
    # server is reachable before DNS propagation completes.
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 200 "rentershield.org — nginx is running. Set DNS A records to point to this IP.\n";
            add_header Content-Type text/plain;
        }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name rentershield.org www.rentershield.org ftp.rentershield.org;

        ssl_certificate     /etc/letsencrypt/live/rentershield.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rentershield.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Landing page is the site root
        location = / {
            return 301 /about;
        }

        # Redirect /investigator (no trailing slash) so the Streamlit baseUrlPath
        # always receives the canonical /investigator/ prefix it expects.
        location = /investigator {
            return 301 /investigator/;
        }

        # --- Static landing page ---
        location /about {
            alias /usr/share/nginx/html/landing;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        # --- Static assets (no rate limit, cached) ---
        location /static/ {
            proxy_pass http://renter;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_cache_valid 200 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        location /investigator/static/ {
            proxy_pass http://investigator;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_cache_valid 200 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # --- Streamlit internal endpoints (no rate limit) ---
        location /_stcore/ {
            proxy_pass http://renter;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        location /investigator/_stcore/ {
            proxy_pass http://investigator;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # --- API routes ---
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://api/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Renter Streamlit (public, default) ---
        location / {
            limit_req zone=web burst=20 nodelay;

            proxy_pass http://renter;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # --- Investigator Streamlit (separate path) ---
        # Streamlit is started with --server.baseUrlPath investigator so it
        # expects to receive requests with the /investigator/ prefix intact.
        # proxy_pass without a trailing-slash URI preserves the full path.
        location /investigator/ {
            limit_req zone=web burst=20 nodelay;

            proxy_pass http://investigator;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # Health check
        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
