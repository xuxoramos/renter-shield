services:
  app:
    build: ..
    restart: unless-stopped
    # Memory guard: keep the app container within 3.5 GB so the host OS
    # and nginx still have room on a 4 GB VPS.  The extra 512 MB swap
    # cushion (memswap_limit - mem_limit) absorbs short spikes without
    # triggering the OOM killer.
    mem_limit: 3584m
    memswap_limit: 4096m
    environment:
      - LI_OUTPUT_DIR=/app/output
      - LI_API_KEYS=${LI_API_KEYS:-changeme}
    volumes:
      # Mount scored data at runtime (alternative to baking it into the image)
      - ../output:/app/output:ro
      # Persist audit DB (user tokens/sessions) across redeploys
      - app-logs:/app/logs
    expose:
      - "8000"
      - "8501"
      - "8502"

  nginx:
    image: nginx:1-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment after running certbot
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

volumes:
  app-logs:
